{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>{% block title %}Agenda de Citas{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}?v=20260410-service-picker-custom">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}theme-root{% endblock %}">
    <div class="site-shell">
        {% block site %}{% endblock %}
    </div>
    <script src="{% static 'js/app.js' %}?v=20260410-selector-fix" defer></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
